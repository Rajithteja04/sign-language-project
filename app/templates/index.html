<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign Language Translation</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <main>
    <h1>Real-Time Sign-to-Text Translation</h1>
    <section class="controls card">
      <label for="gesture-mode">Gesture Category</label>
      <select id="gesture-mode">
        <option value="word">Word Gesture (WLASL)</option>
        <option value="sentence">Sentence Gesture (How2Sign)</option>
      </select>
      <button id="start-btn" type="button">Start</button>
      <button id="stop-btn" type="button" disabled>Stop</button>
    </section>

    <section class="layout">
      <div class="card">
        <h2>Camera Preview</h2>
        <video id="self-view" autoplay muted playsinline></video>
        <div id="preview-status">Requesting camera permission...</div>
      </div>

      <div class="card">
        <div id="status">Connecting...</div>
        <div id="output">(waiting for predictions)</div>
        <div id="words-output">words: -</div>
        <div id="sentence-output">sentence: -</div>
        <div id="meta">
          <span id="mode">mode: unknown</span>
          <span id="gesture-mode-meta">gesture_mode: -</span>
          <span id="confidence">confidence: 0.0000</span>
          <span id="timestamp">timestamp: -</span>
        </div>
      </div>
    </section>
  </main>

  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js" crossorigin="anonymous"></script>
  <script src="/static/app.js"></script>
</body>
</html>
