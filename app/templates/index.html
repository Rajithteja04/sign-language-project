<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign Language Translation</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <main class="layout">
    <h1>Real-Time Sign-to-Text Translation</h1>

    <section class="toolbar card">
      <button id="startBtn" class="btn primary">Start</button>
      <button id="stopBtn" class="btn">Stop</button>
      <button id="clearBtn" class="btn warn">Clear Sentence</button>
      <span id="statusText" class="status">Ready.</span>
    </section>

    <section class="grid">
      <article class="card">
        <h2>Webcam Feed</h2>
        <video id="preview" autoplay playsinline muted></video>
      </article>

      <article class="card">
        <div class="field">
          <label>Current Word</label>
          <div id="currentWord" class="value">(waiting)</div>
        </div>

        <div class="field">
          <label>Confidence</label>
          <div class="conf-row">
            <span id="confidenceValue">0.000</span>
          </div>
          <div class="progress-wrap">
            <div id="confidenceBar" class="progress-fill low" style="width: 0%"></div>
          </div>
        </div>

        <div class="field">
          <label>Gloss Sequence</label>
          <div id="glossChips" class="chips"></div>
        </div>

        <div class="field">
          <label>Corrected Sentence</label>
          <div id="sentenceText" class="value sentence">-</div>
        </div>
      </article>
    </section>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
