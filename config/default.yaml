dataset: how2sign
dataset_root: D:/DATASETS/How2Sign
sequence_length: 30
feature_dim: 411   # OpenPose-like canonical vector: (25+70+21+21)*3
lstm_hidden: 256
lstm_layers: 2
batch_size: 16
learning_rate: 0.0003
epochs: 30
top_k_classes: 200
max_samples_per_split: 3000
artifacts_dir: artifacts

# Realtime app settings
camera_index: 0
emit_interval_ms: 1000
use_mock_inference: true
lstm_weights_path: artifacts/lstm_best.pt
labels_path: artifacts/label_to_id.json
meta_path: artifacts/lstm_meta.json
nlp_model: null

